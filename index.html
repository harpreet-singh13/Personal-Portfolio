<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Harpreet Singh — AI Generalist & Salesforce Agentforce Specialist. Building intelligent agents and enterprise AI solutions with React, Node.js, and the Salesforce platform."
    />
    <meta
      name="keywords"
      content="AI Generalist, Salesforce Agentforce, Salesforce Developer, React, Node.js, AI Engineer, Harpreet Singh, Bounteous"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"

    />

    <meta property="og:title" content="Harpreet Singh | AI Generalist & Salesforce Agentforce Specialist" />

    <meta property="og:type" content="website" />

    <title>Harpreet Singh | AI Generalist & Salesforce Agentforce Specialist</title>

    <style>
      .preloader {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #070B14;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .preloader.fade-out { opacity: 0; }
      .loader {
        width: 48px; height: 48px;
        border: 2px solid rgba(255,255,255,0.08);
        border-radius: 50%;
        border-top-color: #00A1E0;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="preloader" id="preloader">
      <div class="loader"></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      window.addEventListener("load", function () {
        const preloader = document.getElementById("preloader");
        preloader.classList.add("fade-out");
        setTimeout(() => { preloader.style.display = "none"; }, 500);
      });
    </script>
  </body>
</html>
